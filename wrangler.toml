# Cloudflare Pages configuration
# Specifies the Node.js version for the build environment

[compatibility_date]
# Use a recent date for all modern features
date = "2024-01-01"

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[vars]
# Environment variables can be added here if needed
NODE_VERSION = "20.19.6"
